spring.application.name=agent-portal
server.port=8080

# H2 file DB for local persistence (survives restarts)
spring.datasource.url=jdbc:h2:file:./data/agent-portal;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Cursor CLI ACP — override with absolute path if `agent` is not on PATH
agent.cursor.command=${CURSOR_AGENT_CMD:agent}
agent.cursor.api-key=${CURSOR_API_KEY:}
agent.workspace.root=${AGENT_WORKSPACE_ROOT:./workspaces}
agent.default-auto-approve=false

# Antigravity CLI (agy) — override with absolute path if `agy` is not on PATH
agent.antigravity.command=${AGY_CMD:agy}
agent.antigravity.brain-root=${user.home}/.gemini/antigravity-cli
agent.antigravity.skip-permissions=true
agent.antigravity.print-timeout=5m
agent.antigravity.poll-interval-ms=500

# CORS for Angular (localhost + any host on :4200 for LAN/public IP)
app.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200,http://*:4200

spring.jackson.serialization.write-dates-as-timestamps=false

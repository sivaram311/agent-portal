spring.application.name=agent-portal
server.port=8080

# H2 file DB for local persistence (survives restarts)
spring.datasource.url=jdbc:h2:file:./data/agent-portal;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Cursor CLI ACP — override with absolute path if `agent` is not on PATH
agent.cursor.command=${CURSOR_AGENT_CMD:agent}
agent.cursor.api-key=${CURSOR_API_KEY:}
agent.workspace.root=${AGENT_WORKSPACE_ROOT:./workspaces}
# Comma-separated absolute roots allowed in addition to agent.workspace.root (empty = sandbox only).
agent.workspace.allowed-roots=${AGENT_WORKSPACE_ALLOWED_ROOTS:}
agent.default-auto-approve=${AGENT_DEFAULT_AUTO_APPROVE:false}

# Antigravity CLI (agy) — override with absolute path if `agy` is not on PATH
agent.antigravity.command=${AGY_CMD:agy}
agent.antigravity.brain-root=${user.home}/.gemini/antigravity-cli
agent.antigravity.skip-permissions=true
agent.antigravity.interactive-mode=true
agent.antigravity.interactive-protocol=auto
agent.antigravity.prefer-acp=true
agent.workspace.quota-bytes-per-user=${AGENT_WORKSPACE_QUOTA_BYTES:0}
agent.cursor.model=${CURSOR_MODEL:}
agent.antigravity.model=${AGY_MODEL:}
app.webhooks.url=${APP_WEBHOOK_URL:}
agent.antigravity.print-timeout=5m
agent.antigravity.poll-interval-ms=500

# CORS — Agent API allows any origin (auth still required: CSS JWT or X-API-Key).
# Use allowedOriginPatterns; "*" is valid with credentials in Spring.
app.cors.allowed-origins=${APP_CORS_ORIGINS:*}

# Optional API key. When set, accept X-API-Key as a local/dev fallback alongside CSS JWT.
app.security.api-key=${AGENT_PORTAL_API_KEY:}
app.rate-limit.per-minute=120

# Machine Gateway (Host Consciousness API)
app.machine-gateway.enabled=${MACHINE_GATEWAY_ENABLED:true}
app.machine-gateway.workspace-path=${MACHINE_GATEWAY_WORKSPACE:machine-gateway}
app.machine-gateway.sandbox-root=${MACHINE_SANDBOX_ROOT:E:/MyWorkspace/sandbox}
app.machine-gateway.ttl-seconds=${MACHINE_GATEWAY_TTL_SECONDS:15}
app.machine-gateway.max-mode=${MACHINE_GATEWAY_MAX_MODE:act}
app.machine-gateway.default-provider=${MACHINE_GATEWAY_PROVIDER:cursor}

# Centralized Security System (CSS) — preferred multi-app auth
css.enabled=${CSS_ENABLED:false}
css.auth-url=${CSS_AUTH_URL:http://localhost:9000}
css.jwks-uri=${CSS_JWKS_URI:http://localhost:9000/.well-known/jwks.json}
css.issuer=${CSS_ISSUER:http://localhost:9000}
css.client-id=agent-portal
css.auth-mode=${CSS_AUTH_MODE:hybrid}
css.oauth-redirect-path=${CSS_OAUTH_REDIRECT_PATH:/oauth/callback}
# css-spring-boot-starter (resource server) — mirrors css.* for JWKS validation
css.resource-server.enabled=${CSS_ENABLED:false}
css.resource-server.jwks-uri=${CSS_JWKS_URI:http://localhost:9000/.well-known/jwks.json}
css.resource-server.issuer=${CSS_ISSUER:http://localhost:9000}
css.resource-server.client-id=agent-portal
css.resource-server.jwks-cache-seconds=3600
css.resource-server.register-servlet-filter=false

spring.jackson.serialization.write-dates-as-timestamps=false

# Preprod — Agent Portal (activate: --spring.profiles.active=preprod,postgres)
server.port=${AGENT_PORTAL_PORT:4080}

spring.datasource.url=${AGENT_PORTAL_JDBC_URL:jdbc:postgresql://127.0.0.1:5432/app_agent_portal?currentSchema=preprod}
spring.datasource.username=${AGENT_PORTAL_DB_USER:app_agent_portal_preprod}
spring.datasource.password=${AGENT_PORTAL_DB_PASSWORD:}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=preprod
spring.h2.console.enabled=false

css.enabled=true
css.auth-url=${CSS_AUTH_URL:}
css.jwks-uri=${CSS_JWKS_URI:http://127.0.0.1:5910/.well-known/jwks.json}
css.issuer=${CSS_ISSUER:https://css-next.delena.buzz}
css.client-id=agent-portal
css.auth-mode=${CSS_AUTH_MODE:hybrid}
css.oauth-redirect-path=${CSS_OAUTH_REDIRECT_PATH:/oauth/callback}
css.resource-server.enabled=true
css.resource-server.jwks-uri=${CSS_JWKS_URI:http://127.0.0.1:5910/.well-known/jwks.json}
css.resource-server.issuer=${CSS_ISSUER:https://css-next.delena.buzz}
css.resource-server.client-id=agent-portal

app.cors.allowed-origins=${APP_CORS_ORIGINS:https://agent-portal-staging.delena.buzz,https://css-next.delena.buzz}
app.rate-limit.per-minute=180
agent.antigravity.skip-permissions=${AGENT_ANTIGRAVITY_SKIP_PERMISSIONS:true}

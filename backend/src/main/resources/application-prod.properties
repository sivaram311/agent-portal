# Safer defaults for shared / public deployments
agent.antigravity.skip-permissions=false
css.enabled=true
css.resource-server.enabled=true
app.rate-limit.per-minute=60
spring.h2.console.enabled=false
# Replace with concrete origins in real deploys (no wildcards)
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:4200}

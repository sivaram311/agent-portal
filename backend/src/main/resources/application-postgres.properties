# Prefer app_agent_portal + env schema (override via AGENT_PORTAL_*). Legacy agentportal DB still supported via POSTGRES_*.
spring.datasource.url=${AGENT_PORTAL_JDBC_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:agentportal}}
spring.datasource.username=${AGENT_PORTAL_DB_USER:${POSTGRES_USER:agent}}
spring.datasource.password=${AGENT_PORTAL_DB_PASSWORD:${POSTGRES_PASSWORD:agent}}
spring.datasource.driverClassName=org.postgresql.Driver
# Shared PG :5432 — INCIDENT 2026-07-16 (PROPOSAL pool-caps, Grok PROCEED)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.keepalive-time=30000
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

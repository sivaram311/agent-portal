name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Install css-spring-boot-starter
        working-directory: ${{ github.workspace }}
        run: |
          git clone --depth 1 https://github.com/sivaram311/centralized-security-system.git /tmp/css
          mvn -B -DskipTests -f /tmp/css/clients/spring-boot-starter/pom.xml install
      - name: Build backend
        run: ./mvnw -B -DskipTests package
      - name: Unit tests
        run: ./mvnw -B test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build

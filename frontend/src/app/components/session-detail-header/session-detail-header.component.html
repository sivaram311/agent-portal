@if (session) {
  <header class="head">
    <div class="left">
      @if (showBack) {
        <button type="button" class="ap-btn ap-btn-ghost back" (click)="back.emit()" aria-label="Back">
          ←
        </button>
      }
      <div class="titles">
        <div class="title-row">
          <h2 [title]="session.title">{{ session.title }}</h2>
          <div class="badges">
            <app-agent-type-badge [provider]="session.provider" />
            <app-status-pill [status]="session.status" />
            @if (session.platformRole) {
              <span class="role-chip" [title]="session.rolePromptHint || session.platformRole">
                {{ session.platformRole }}
              </span>
            }
          </div>
          <div class="actions inline-actions">
            @if (busy) {
              <button type="button" class="ap-btn ap-btn-ghost cancel-btn" (click)="cancel.emit()">Cancel</button>
            }
            <button
              type="button"
              class="ap-btn ap-btn-danger archive-btn"
              (click)="archive.emit(session.id)"
              title="Archive"
              aria-label="Archive session"
            >
              <span class="archive-label">Archive</span>
            </button>
          </div>
        </div>
        <div class="path-row">
          <p
            class="path"
            [title]="session.workspacePath + ' — long-press or tap copy'"
            (pointerdown)="onPathPointerDown($event)"
            (pointerup)="onPathPointerUp()"
            (pointerleave)="clearLongPress()"
            (pointercancel)="clearLongPress()"
            (contextmenu)="$event.preventDefault()"
          >
            {{ session.workspacePath }}
          </p>
          <button
            type="button"
            class="ap-btn ap-btn-ghost copy-btn"
            (click)="copyPathClick()"
            aria-label="Copy workspace path"
            title="Copy path"
          >
            Copy
          </button>
        </div>
        @if (session.provider === 'antigravity') {
          <p class="note" title="Streaming from Antigravity transcript / brain artifacts">
            Agy stream
          </p>
        }
      </div>
    </div>
    <div class="actions desktop-actions">
      @if (busy) {
        <button type="button" class="ap-btn ap-btn-ghost" (click)="cancel.emit()">Cancel</button>
      }
      <button type="button" class="ap-btn ap-btn-danger" (click)="archive.emit(session.id)">
        Archive
      </button>
    </div>
  </header>
}

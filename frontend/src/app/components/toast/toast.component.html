<div class="toast-stack" aria-live="polite">
  @for (t of toastService.toasts$ | async; track t.id) {
    <div class="toast" [class.error]="t.kind === 'error'" [class.success]="t.kind === 'success'">
      <span>{{ t.message }}</span>
      <button type="button" class="dismiss" (click)="toastService.dismiss(t.id)" aria-label="Dismiss">×</button>
    </div>
  }
</div>

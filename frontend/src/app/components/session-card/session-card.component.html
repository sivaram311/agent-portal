<button
  type="button"
  class="card"
  data-testid="session-card"
  [class.active]="active"
  (click)="onCardClick()"
>
  <div class="top">
    <strong class="title">{{ session.title }}</strong>
    <span class="time">{{ relativeTime(session.updatedAt) }}</span>
  </div>
  <p
    class="path"
    [title]="session.workspacePath"
    (pointerdown)="onPathPointerDown($event)"
    (pointerup)="onPathPointerUp($event)"
    (pointerleave)="clearLongPress()"
    (pointercancel)="clearLongPress()"
    (contextmenu)="$event.preventDefault()"
  >
    {{ session.workspacePath }}
  </p>
  <div class="meta">
    <app-agent-type-badge [provider]="session.provider" />
    <app-status-pill [status]="session.status" />
    <button
      type="button"
      class="archive"
      [title]="session.status === 'ARCHIVED' ? 'Restore' : 'Archive'"
      (click)="$event.stopPropagation(); archive.emit(session.id)"
    >
      {{ session.status === 'ARCHIVED' ? 'Restore' : 'Archive' }}
    </button>
  </div>
</button>

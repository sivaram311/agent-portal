<nav class="tabs-wrap" aria-label="Session views">
  <div class="tabs" role="tablist">
    @for (t of tabs; track t.id) {
      <button
        type="button"
        role="tab"
        class="tab"
        [class.on]="active === t.id"
        [attr.aria-selected]="active === t.id"
        (click)="select(t.id)"
      >
        {{ t.label }}
      </button>
    }
  </div>
</nav>

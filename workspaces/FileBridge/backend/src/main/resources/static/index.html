<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0F172A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>VPS FileBridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #0F172A;
      --bg-surface: #1E2937;
      --bg-surface-hover: #334155;
      --accent-primary: #6366F1;
      --accent-secondary: #22D3EE;
      --text-primary: #F8FAFC;
      --text-secondary: #94A3B8;
      --text-muted: #64748B;
      --danger: #EF4444;
      --border: #475569;
      --glass-bg: rgba(30, 41, 55, 0.88);
      --radius: 16px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --nav-h: 64px;
      --pad-x: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    body {
      margin: 0;
      min-height: 100%;
      min-height: 100dvh;
      font-family: "Sora", system-ui, sans-serif;
      color: var(--text-primary);
      background:
        radial-gradient(900px 480px at 8% -8%, rgba(99,102,241,.22), transparent 55%),
        radial-gradient(700px 420px at 100% 0%, rgba(34,211,238,.1), transparent 50%),
        linear-gradient(160deg, #0B1224 0%, var(--bg-primary) 45%, #111827 100%);
      background-attachment: fixed;
      overflow-x: hidden;
    }
    button, input { font: inherit; color: inherit; }
    button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .hidden { display: none !important; }

    /* —— Login —— */
    #login-view {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: max(16px, var(--safe-top)) var(--pad-x) max(24px, var(--safe-bottom));
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(71,85,105,.55);
      border-radius: 24px;
      padding: 28px 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,.35);
      animation: rise .45s ease both;
    }
    .brand {
      font-size: clamp(1.55rem, 6.5vw, 2.1rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin: 0 0 8px;
      text-align: center;
      background: linear-gradient(90deg, #fff, var(--accent-secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .sub { color: var(--text-secondary); margin: 0 0 22px; font-size: .9rem; line-height: 1.4; text-align: center; }
    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: .78rem; color: var(--text-secondary); margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 14px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(15,23,42,.75);
      color: var(--text-primary);
      outline: none;
      font-size: 16px; /* prevent Chrome mobile zoom */
    }
    .field input:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,.25);
    }
    .btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      background: var(--accent-primary);
      color: #fff;
      font-weight: 600;
      font-size: .9rem;
      min-height: 48px;
      transition: filter .15s ease, transform .15s ease;
    }
    .btn:active { transform: scale(.98); }
    .btn-block { width: 100%; }
    .btn-ghost {
      background: rgba(30,41,55,.65);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-danger { background: var(--danger); }
    .btn-sm {
      min-height: 42px;
      padding: 8px 10px;
      font-size: .8rem;
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .error { color: #fecaca; font-size: .85rem; min-height: 1.2em; margin: 6px 0 12px; }

    /* —— App shell —— */
    #app-view {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 100vw;
      overflow-x: hidden;
      padding-bottom: calc(var(--nav-h) + var(--safe-bottom));
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-areas:
        "title actions"
        "search search"
        "stats stats";
      gap: 10px 12px;
      align-items: center;
      padding: calc(14px + var(--safe-top)) var(--pad-x) 12px;
      border-bottom: 1px solid rgba(71,85,105,.4);
      background: rgba(15,23,42,.78);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 20;
      width: 100%;
    }
    .topbar h1 {
      grid-area: title;
      font-size: 1.05rem;
      margin: 0;
      letter-spacing: -.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .top-actions {
      grid-area: actions;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search {
      grid-area: search;
      width: 100%;
      min-width: 0;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(30,41,55,.85);
      color: var(--text-primary);
      font-size: 16px;
    }
    .stats {
      grid-area: stats;
      color: var(--text-secondary);
      font-size: .75rem;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .desktop-only { display: none; }

    .crumbs {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 10px var(--pad-x) 0;
      color: var(--text-secondary);
      font-size: .82rem;
      width: 100%;
    }
    .crumbs::-webkit-scrollbar { display: none; }
    .crumbs button {
      background: none;
      border: 0;
      color: var(--accent-secondary);
      cursor: pointer;
      padding: 6px 4px;
      min-height: 40px;
      flex: 0 0 auto;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .crumbs span { flex: 0 0 auto; opacity: .5; }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 10px var(--pad-x) 8px;
      width: 100%;
    }
    .toolbar .btn {
      width: 100%;
      min-width: 0;
      justify-content: center;
      display: inline-flex;
      align-items: center;
    }

    .content {
      flex: 1;
      padding: 4px var(--pad-x) 120px;
      width: 100%;
      min-width: 0;
    }
    .grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }
    .card {
      background: var(--glass-bg);
      border: 1px solid rgba(71,85,105,.45);
      border-radius: var(--radius);
      padding: 12px 12px 12px 12px;
      cursor: pointer;
      min-height: 64px;
      min-width: 0;
      width: 100%;
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr) 22px;
      grid-template-areas: "icon body check";
      column-gap: 12px;
      align-items: center;
      position: relative;
      transition: background .15s ease, border-color .15s ease;
    }
    .card:active { background: var(--bg-surface-hover); }
    .card.selected {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(99,102,241,.35);
    }
    .icon {
      grid-area: icon;
      width: 40px; height: 40px; border-radius: 12px;
      display: grid; place-items: center;
      background: rgba(99,102,241,.18);
      font-size: 1.15rem;
      flex: 0 0 auto;
    }
    .card-body {
      grid-area: body;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .name {
      font-weight: 600;
      font-size: .9rem;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      word-break: normal;
    }
    .meta { color: var(--text-muted); font-size: .72rem; margin-top: 0; }
    .check {
      grid-area: check;
      position: static;
      width: 22px;
      height: 22px;
      margin: 0;
      accent-color: var(--accent-primary);
      justify-self: end;
    }
    .empty {
      text-align: center;
      color: var(--text-secondary);
      padding: 48px 16px;
      border: 1px dashed rgba(71,85,105,.5);
      border-radius: 20px;
      margin-top: 8px;
      font-size: .9rem;
      line-height: 1.45;
    }

    .fab {
      position: fixed;
      right: max(16px, env(safe-area-inset-right, 0px));
      bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-primary), #4f46e5);
      color: #fff;
      border: 0;
      font-size: 1.45rem;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(99,102,241,.45);
      z-index: 30;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      align-items: stretch;
      height: calc(var(--nav-h) + var(--safe-bottom));
      padding: 0 12px var(--safe-bottom);
      background: rgba(15,23,42,.96);
      border-top: 1px solid rgba(71,85,105,.45);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      z-index: 40;
    }
    .bottom-nav button {
      background: none;
      border: 0;
      color: var(--text-secondary);
      padding: 8px 4px;
      cursor: pointer;
      min-height: var(--nav-h);
      font-size: .75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .bottom-nav button.active { color: var(--accent-secondary); }
    .bottom-nav .nav-ico { font-size: 1.1rem; line-height: 1; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(var(--nav-h) + var(--safe-bottom) + 72px);
      transform: translateX(-50%);
      max-width: calc(100vw - 32px);
      background: #0b1220;
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 12px 16px;
      border-radius: 12px;
      z-index: 60;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      font-size: .88rem;
      text-align: center;
    }
    .toast.show { opacity: 1; }

    .progress {
      position: fixed;
      left: var(--pad-x);
      right: var(--pad-x);
      bottom: calc(var(--nav-h) + var(--safe-bottom) + 8px);
      height: 8px;
      background: rgba(30,41,55,.95);
      border-radius: 99px;
      overflow: hidden;
      z-index: 50;
      display: none;
    }
    .progress > span {
      display: block; height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
      transition: width .15s linear;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Phablet / small tablet */
    @media (min-width: 640px) {
      .login-card { padding: 36px 28px; }
      --pad-x: 20px;
      .toolbar { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      .card {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        min-height: 120px;
        padding: 14px 12px;
        gap: 8px;
      }
      .card-body { display: contents; }
      .icon { grid-area: auto; }
      .name {
        white-space: normal;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        text-overflow: unset;
      }
      .meta { margin-top: auto; }
      .check {
        position: absolute;
        top: 8px;
        right: 8px;
        justify-self: auto;
      }
    }

    /* Desktop */
    @media (min-width: 900px) {
      #app-view { padding-bottom: 0; max-width: 1200px; margin: 0 auto; }
      .topbar {
        grid-template-columns: auto minmax(180px, 320px) 1fr auto auto;
        grid-template-areas: "title search stats actions";
        align-items: center;
      }
      .desktop-only { display: inline-flex; }
      .mobile-only { display: none !important; }
      .fab {
        bottom: 28px;
        right: max(28px, calc((100vw - 1200px) / 2 + 28px));
      }
      .bottom-nav { display: none; }
      .content { padding-bottom: 40px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      .toolbar { grid-template-columns: repeat(4, max-content); justify-content: start; }
      .toolbar .btn { width: auto; }
      .brand, .login-card .sub { text-align: left; }
      .login-card .sub[style] { text-align: center !important; }
    }
  </style>
</head>
<body>
  <div id="login-view">
    <form class="login-card" id="login-form">
      <h1 class="brand">VPS FileBridge</h1>
      <p class="sub">Secure files from anywhere</p>
      <div class="field">
        <label for="username">Username</label>
        <input id="username" autocomplete="username" value="admin" required inputmode="text" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" value="admin123" required />
      </div>
      <div class="error" id="login-error"></div>
      <button class="btn btn-block" type="submit">Login</button>
      <p class="sub" style="margin:16px 0 0;font-size:.75rem;text-align:center">Self-hosted · MVP</p>
    </form>
  </div>

  <div id="app-view" class="hidden">
    <header class="topbar">
      <h1>FileBridge</h1>
      <div class="top-actions">
        <button class="btn btn-ghost btn-sm desktop-only" id="logout-btn" type="button">Logout</button>
      </div>
      <input class="search" id="search" type="search" enterkeyhint="search" placeholder="Search files…" />
      <div class="stats" id="stats">—</div>
    </header>
    <nav class="crumbs" id="crumbs" aria-label="Breadcrumb"></nav>
    <div class="toolbar" role="toolbar">
      <button class="btn btn-sm" id="new-folder-btn" type="button">New folder</button>
      <button class="btn btn-ghost btn-sm" id="download-btn" type="button">Download</button>
      <button class="btn btn-danger btn-sm" id="delete-btn" type="button">Delete</button>
      <button class="btn btn-ghost btn-sm" id="refresh-btn" type="button">Refresh</button>
    </div>
    <main class="content">
      <div class="grid" id="file-grid"></div>
      <div class="empty hidden" id="empty">This folder is empty. Upload something to get started.</div>
    </main>
    <button class="fab" id="upload-fab" title="Upload" type="button" aria-label="Upload files">↑</button>
    <input type="file" id="file-input" multiple hidden />
    <nav class="bottom-nav mobile-only" aria-label="Primary">
      <button type="button" class="active" id="nav-home"><span class="nav-ico">⌂</span>Home</button>
      <button type="button" id="nav-upload"><span class="nav-ico">↑</span>Upload</button>
      <button type="button" id="nav-logout"><span class="nav-ico">⎋</span>Logout</button>
    </nav>
  </div>

  <div class="progress" id="progress"><span></span></div>
  <div class="toast" id="toast"></div>

  <script>
    const state = {
      token: localStorage.getItem('fb_token') || '',
      path: '/',
      items: [],
      selected: new Set(),
      query: ''
    };

    const $ = (id) => document.getElementById(id);
    const loginView = $('login-view');
    const appView = $('app-view');

    function toast(msg) {
      const el = $('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2200);
    }

    function formatBytes(n) {
      if (n < 1024) return n + ' B';
      const u = ['KB','MB','GB','TB'];
      let i = -1;
      do { n /= 1024; i++; } while (n >= 1024 && i < u.length - 1);
      return n.toFixed(n >= 10 || i === 0 ? 0 : 1) + ' ' + u[i];
    }

    async function api(path, options = {}) {
      const headers = Object.assign({}, options.headers || {});
      if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
      if (options.body && !(options.body instanceof FormData)) {
        headers['Content-Type'] = 'application/json';
        options.body = JSON.stringify(options.body);
      }
      const res = await fetch(path, { ...options, headers });
      if (res.status === 401) {
        logout(false);
        throw new Error('Unauthorized');
      }
      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || res.statusText);
      }
      if (res.status === 204) return null;
      const ct = res.headers.get('content-type') || '';
      if (ct.includes('application/json')) return res.json();
      return res;
    }

    function showApp() {
      loginView.classList.add('hidden');
      appView.classList.remove('hidden');
      loadFiles();
      loadStats();
    }

    function logout(callApi = true) {
      if (callApi && state.token) api('/api/auth/logout', { method: 'POST' }).catch(() => {});
      state.token = '';
      localStorage.removeItem('fb_token');
      appView.classList.add('hidden');
      loginView.classList.remove('hidden');
    }

    $('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      $('login-error').textContent = '';
      try {
        const data = await api('/api/auth/login', {
          method: 'POST',
          body: { username: $('username').value.trim(), password: $('password').value }
        });
        state.token = data.token;
        localStorage.setItem('fb_token', data.token);
        showApp();
      } catch (err) {
        $('login-error').textContent = 'Invalid username or password';
      }
    });

    async function loadStats() {
      try {
        const s = await api('/api/storage/stats');
        $('stats').textContent = formatBytes(s.usedBytes) + ' used · ' + formatBytes(s.freeBytes) + ' free';
      } catch {}
    }

    async function loadFiles() {
      state.selected.clear();
      const items = await api('/api/files?path=' + encodeURIComponent(state.path));
      state.items = items;
      renderCrumbs();
      renderGrid();
    }

    function renderCrumbs() {
      const parts = state.path.split('/').filter(Boolean);
      let html = '<button type="button" data-path="/">Root</button>';
      let acc = '';
      parts.forEach((p) => {
        acc += '/' + p;
        html += '<span>/</span><button type="button" data-path="' + acc + '">' + escapeHtml(p) + '</button>';
      });
      $('crumbs').innerHTML = html;
      $('crumbs').querySelectorAll('button').forEach((btn) => {
        btn.addEventListener('click', () => {
          state.path = btn.dataset.path;
          loadFiles();
        });
      });
    }

    function iconFor(item) {
      if (item.directory) return '📁';
      const e = (item.extension || '').toLowerCase();
      if (['png','jpg','jpeg','gif','webp','svg'].includes(e)) return '🖼';
      if (['pdf'].includes(e)) return '📄';
      if (['zip','rar','7z'].includes(e)) return '🗜';
      if (['mp4','mov','mkv'].includes(e)) return '🎬';
      if (['txt','md','json','log','csv'].includes(e)) return '📝';
      return '📦';
    }

    function renderGrid() {
      const q = state.query.trim().toLowerCase();
      const items = state.items.filter(i => !q || i.name.toLowerCase().includes(q));
      const grid = $('file-grid');
      const empty = $('empty');
      if (!items.length) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      grid.innerHTML = items.map((item) => {
        const selected = state.selected.has(item.path) ? ' selected' : '';
        const checked = state.selected.has(item.path) ? 'checked' : '';
        const meta = item.directory ? 'Folder' : formatBytes(item.size);
        return `<article class="card${selected}" data-path="${item.path}" data-dir="${item.directory}">
          <div class="icon">${iconFor(item)}</div>
          <div class="card-body">
            <div class="name">${escapeHtml(item.name)}</div>
            <div class="meta">${meta}</div>
          </div>
          <input class="check" type="checkbox" ${checked} data-path="${item.path}" aria-label="Select ${escapeHtml(item.name)}" />
        </article>`;
      }).join('');

      grid.querySelectorAll('.card').forEach((card) => {
        card.addEventListener('click', (e) => {
          if (e.target.classList.contains('check')) return;
          const path = card.dataset.path;
          const isDir = card.dataset.dir === 'true';
          if (isDir) {
            state.path = path;
            loadFiles();
          } else {
            downloadOne(path);
          }
        });
      });
      grid.querySelectorAll('.check').forEach((cb) => {
        cb.addEventListener('click', (e) => e.stopPropagation());
        cb.addEventListener('change', () => {
          if (cb.checked) state.selected.add(cb.dataset.path);
          else state.selected.delete(cb.dataset.path);
          renderGrid();
        });
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function downloadOne(path) {
      const res = await api('/api/files/download?path=' + encodeURIComponent(path));
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = path.split('/').pop();
      a.click();
      URL.revokeObjectURL(a.href);
    }

    $('search').addEventListener('input', (e) => {
      state.query = e.target.value;
      renderGrid();
    });

    $('new-folder-btn').addEventListener('click', async () => {
      const name = prompt('Folder name');
      if (!name) return;
      await api('/api/files/folder', { method: 'POST', body: { path: state.path, name } });
      toast('Folder created');
      loadFiles();
    });

    $('delete-btn').addEventListener('click', async () => {
      if (!state.selected.size) return toast('Select items first');
      if (!confirm('Delete selected items?')) return;
      await api('/api/files', { method: 'DELETE', body: { paths: [...state.selected] } });
      toast('Deleted');
      loadFiles();
      loadStats();
    });

    $('download-btn').addEventListener('click', async () => {
      if (!state.selected.size) return toast('Select items first');
      const paths = [...state.selected];
      if (paths.length === 1 && !state.items.find(i => i.path === paths[0])?.directory) {
        return downloadOne(paths[0]);
      }
      const res = await api('/api/files/download/zip', { method: 'POST', body: { paths } });
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'files.zip';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    $('refresh-btn').addEventListener('click', () => { loadFiles(); loadStats(); });
    $('logout-btn').addEventListener('click', () => logout());
    $('nav-logout').addEventListener('click', () => logout());
    $('nav-home').addEventListener('click', () => { state.path = '/'; loadFiles(); });
    $('nav-upload').addEventListener('click', () => $('file-input').click());
    $('upload-fab').addEventListener('click', () => $('file-input').click());

    $('file-input').addEventListener('change', async (e) => {
      const files = [...e.target.files];
      if (!files.length) return;
      const bar = $('progress');
      const span = bar.querySelector('span');
      bar.style.display = 'block';
      try {
        for (let i = 0; i < files.length; i++) {
          const fd = new FormData();
          fd.append('file', files[i]);
          await new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/files/upload?path=' + encodeURIComponent(state.path));
            xhr.setRequestHeader('Authorization', 'Bearer ' + state.token);
            xhr.upload.onprogress = (ev) => {
              if (!ev.lengthComputable) return;
              const base = (i / files.length) * 100;
              const part = (ev.loaded / ev.total) * (100 / files.length);
              span.style.width = (base + part) + '%';
            };
            xhr.onload = () => xhr.status >= 200 && xhr.status < 300 ? resolve() : reject(new Error('Upload failed'));
            xhr.onerror = () => reject(new Error('Upload failed'));
            xhr.send(fd);
          });
        }
        span.style.width = '100%';
        toast('Upload complete');
        loadFiles();
        loadStats();
      } catch (err) {
        toast('Upload failed');
      } finally {
        setTimeout(() => { bar.style.display = 'none'; span.style.width = '0%'; }, 400);
        e.target.value = '';
      }
    });

    document.addEventListener('dragover', (e) => e.preventDefault());
    document.addEventListener('drop', (e) => {
      e.preventDefault();
      if (!state.token || !e.dataTransfer.files.length) return;
      $('file-input').files = e.dataTransfer.files;
      $('file-input').dispatchEvent(new Event('change'));
    });

    if (state.token) showApp();
  </script>
</body>
</html>
